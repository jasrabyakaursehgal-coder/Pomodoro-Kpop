<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Pomodoro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-y:auto;

    background:linear-gradient(
        135deg,
        #7f7fd5,
        #91eae4,
        #e0c3fc,
        #8ec5fc
    );

    background-size:400% 400%;
    animation:bgMove 18s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
    background:
        radial-gradient(circle, white 1px, transparent 2px) 10px 20px/120px 120px,
        radial-gradient(circle, white 2px, transparent 3px) 70px 80px/170px 170px,
        radial-gradient(circle, rgba(255,255,255,0.8) 2px, transparent 3px) 30px 50px/200px 200px;
    animation:twinkle 4s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.5;}
    to{opacity:1;}
}

.cloud{
    position:fixed;
    background:rgba(255,255,255,0.25);
    border-radius:100px;
    filter:blur(2px);
    z-index:1;
}

.cloud1{
    width:220px;
    height:70px;
    top:15%;
    left:-250px;
    animation:floatCloud 45s linear infinite;
}

.cloud2{
    width:300px;
    height:90px;
    top:65%;
    left:-350px;
    animation:floatCloud 60s linear infinite;
}

.cloud3{
    width:180px;
    height:60px;
    top:40%;
    left:-250px;
    animation:floatCloud 55s linear infinite;
}

@keyframes floatCloud{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(1800px);
    }
}

.container{
    position:relative;
    z-index:10;

    width:450px;
    padding:40px;
    margin:30px;

    text-align:center;

    border-radius:35px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.3);

    box-shadow:
        0 0 25px rgba(255,255,255,0.4),
        0 0 60px rgba(190,170,255,0.4),
        0 0 100px rgba(140,220,255,0.3);
}

h1{
    color:white;
    font-size:2.8rem;
}

.clock{
    color:white;
    margin:20px 0;
    font-size:1.2rem;
}

.mode{
    color:white;
    margin-bottom:15px;
}

.timer{
    color:white;
    font-size:5rem;
    font-weight:700;
    text-shadow:
        0 0 20px white,
        0 0 40px #d6b8ff,
        0 0 70px #91eae4;
}

button{
    padding:12px 20px;
    margin:8px;
    border:none;
    border-radius:20px;
    background:rgba(255,255,255,0.18);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-5px);
    box-shadow:
        0 0 15px white,
        0 0 30px #d6b8ff,
        0 0 45px #91eae4;
}

.quote{
    margin-top:20px;
    color:white;
    font-style:italic;
}

.music-player{
    margin-top:25px;
}

.music-player iframe{
    width:100%;
    border:none;
    border-radius:20px;
    margin-top:15px;
}

.achievements{
    margin-top:30px;
    color:white;
}

.achievements p{
    margin:8px;
    padding:10px;
    border-radius:15px;
    background:rgba(255,255,255,0.12);
}

.unlocked{
    background:rgba(255,255,255,0.3) !important;

    box-shadow:
        0 0 10px white,
        0 0 20px #d6b8ff,
        0 0 30px #91eae4;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="container">

<h1>☁️ Aura Pomodoro ✨</h1>

<div class="clock" id="clock"></div>

<div class="mode" id="mode">
🎧 Focus Time
</div>

<div class="timer" id="timer">
25:00
</div>

<button onclick="startTimer()">▶ Start</button>
<button onclick="pauseTimer()">⏸ Pause</button>
<button onclick="resetTimer()">🔄 Reset</button>

<div class="quote">
💿 Train like a trainee. Shine like an idol. ⭐
</div>

<div class="music-player">

<h3 style="color:white;margin-top:20px;">🎧 Study Soundtrack</h3>

<button onclick="showPlaylist('aura')">
💜 Aura Mode
</button>

<button onclick="showPlaylist('cloud')">
☁️ Clouds & Stars
</button>

<iframe
id="playlistFrame"
height="200"
src=""
allowfullscreen>
</iframe>

</div>

<div class="achievements">
<h3>🏆 Achievements</h3>

<p id="a1">🔒 First Pomodoro</p>
<p id="a2">🔒 Focus Apprentice (3 sessions)</p>
<p id="a3">🔒 Productivity Idol (5 sessions)</p>
<p id="a4">🔒 Study Legend (10 sessions)</p>
</div>

</div>

<script>

let workTime = 25 * 60;
let breakTime = 5 * 60;

let timeLeft = workTime;
let timer;
let isRunning = false;
let isWork = true;
let completedSessions = 0;

const timerDisplay = document.getElementById("timer");
const modeDisplay = document.getElementById("mode");

function updateDisplay(){
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;

    timerDisplay.textContent =
    `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
}

function startTimer(){

    if(isRunning) return;

    isRunning = true;

    timer = setInterval(()=>{

        timeLeft--;

        updateDisplay();

        if(timeLeft < 0){

            clearInterval(timer);

            if(isWork){

                completedSessions++;

                unlockAchievements();

                alert("☕ Break Time!");

                isWork = false;
                modeDisplay.textContent = "☕ Break Time";

                timeLeft = breakTime;

            }else{

                alert("🎧 Back to Focus!");

                isWork = true;
                modeDisplay.textContent = "🎧 Focus Time";

                timeLeft = workTime;
            }

            updateDisplay();

            isRunning = false;

            startTimer();
        }

    },1000);
}

function pauseTimer(){
    clearInterval(timer);
    isRunning=false;
}

function resetTimer(){
    clearInterval(timer);

    isRunning=false;
    isWork=true;

    modeDisplay.textContent="🎧 Focus Time";
    timeLeft=workTime;

    updateDisplay();
}

function unlockAchievements(){

    if(completedSessions>=1){
        a1.innerHTML="🏆 First Pomodoro Unlocked!";
        a1.classList.add("unlocked");
    }

    if(completedSessions>=3){
        a2.innerHTML="🏆 Focus Apprentice Unlocked!";
        a2.classList.add("unlocked");
    }

    if(completedSessions>=5){
        a3.innerHTML="🏆 Productivity Idol Unlocked!";
        a3.classList.add("unlocked");
    }

    if(completedSessions>=10){
        a4.innerHTML="🏆 Study Legend Unlocked!";
        a4.classList.add("unlocked");
    }
}

function updateClock(){
    const now = new Date();

    document.getElementById("clock").textContent =
    "🕒 " +
    now.toLocaleTimeString([],{
        hour:'2-digit',
        minute:'2-digit',
        second:'2-digit'
    });
}

setInterval(updateClock,1000);
updateClock();
updateDisplay();

const auraVideo =
"https://www.youtube.com/embed/oCcTZWhhC44";

const cloudVideo =
"https://www.youtube.com/embed/Zy7BLgS5xbg";

function showPlaylist(type){

    const frame =
    document.getElementById("playlistFrame");

    if(type==="aura"){
        frame.src=auraVideo;
    }

    if(type==="cloud"){
        frame.src=cloudVideo;
    }
}

</script>

</body>
</html>
